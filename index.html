<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Fleet Inspection">
<title>Fleet Inspection — Trailers & Forklift</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Barlow',sans-serif;background:#2a2a2b;color:#e8e6e0;min-height:100vh}
.app{max-width:480px;margin:0 auto;padding-bottom:60px}

/* ── Brand colours: Solo Yellow #fddd00 | Dark Grey #3f3f40 | Rhino Grey #9ea0a3 ── */

/* ── Header ── */
.app-hdr{background:#3f3f40;padding:0 0 0 0;border-bottom:4px solid #fddd00}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 10px}
.hdr-brand{display:flex;align-items:center;gap:12px}
.hdr-logo{height:44px;width:auto;display:block}
.hdr-divider{width:1px;height:36px;background:#9ea0a3;opacity:.4}
.hdr-text{}
.hdr-name{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;color:#fddd00;letter-spacing:.08em;text-transform:uppercase;line-height:1.1}
.hdr-sub{font-size:9px;color:#9ea0a3;text-transform:uppercase;letter-spacing:.12em;margin-top:2px}
.hdr-date{font-size:10px;color:#9ea0a3;text-align:right;line-height:1.4}

/* ── Tab nav ── */
.tab-nav{display:flex;gap:0;padding:0;background:#3f3f40;overflow-x:auto;scrollbar-width:none}
.tab-nav::-webkit-scrollbar{display:none}
.tab-btn{flex:1;min-width:80px;height:38px;border:none;background:transparent;color:#9ea0a3;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;border-bottom:3px solid transparent;white-space:nowrap;transition:all .15s}
.tab-btn.active{color:#fddd00;border-bottom-color:#fddd00}
.tab-btn:hover:not(.active){color:#e8e6e0}

.app-body{padding:14px 12px}

/* ── Meta inputs ── */
.meta-card{background:#3f3f40;border:1px solid #555;border-radius:10px;padding:12px;margin-bottom:12px}
.meta-title{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:#9ea0a3;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.meta-grid.three{grid-template-columns:1fr 1fr 1fr}
.meta-field{display:flex;flex-direction:column;gap:3px}
.meta-field label{font-size:9px;font-weight:700;color:#9ea0a3;text-transform:uppercase;letter-spacing:.08em}
.meta-field input,.meta-field select{height:36px;border-radius:6px;border:1px solid #555;background:#2a2a2b;color:#e8e6e0;padding:0 10px;font-size:13px;font-family:inherit;outline:none}
.meta-field input:focus,.meta-field select:focus{border-color:#fddd00}
.meta-field input::placeholder{color:#666}
.meta-field select option{background:#3f3f40}
.meta-field.full{grid-column:1/-1}

/* ── Stats ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
.stat{background:#3f3f40;border:1px solid #555;border-radius:8px;padding:8px 4px;text-align:center}
.stat-label{font-size:9px;color:#9ea0a3;text-transform:uppercase;letter-spacing:.07em;margin-bottom:2px;font-weight:700}
.stat-val{font-size:22px;font-weight:700;line-height:1}
.stat-val.good{color:#4caf78}
.stat-val.fair{color:#fddd00}
.stat-val.dmg{color:#e05555}
.stat-val.tot{color:#e8e6e0}

/* ── Inspection items ── */
.insp-item{background:#3f3f40;border:1px solid #555;border-radius:10px;margin-bottom:8px;overflow:hidden}
.item-hdr{display:flex;align-items:center;gap:10px;padding:11px 12px;cursor:pointer;user-select:none;transition:background .1s}
.item-hdr:hover{background:#4a4a4b}
.item-num{font-size:10px;font-weight:700;color:#9ea0a3;background:#2a2a2b;border-radius:4px;padding:2px 6px;flex-shrink:0;letter-spacing:.03em}
.item-name{flex:1;font-size:14px;font-weight:600;color:#e8e6e0}
.item-status-dot{width:10px;height:10px;border-radius:50%;background:#555;flex-shrink:0;transition:background .2s}
.item-status-dot.good{background:#4caf78}
.item-status-dot.fair{background:#fddd00}
.item-status-dot.damaged{background:#e05555}
.item-status-dot.unusable{background:#8b0000}
.item-chevron{font-size:14px;color:#666;transition:transform .2s;flex-shrink:0}
.item-chevron.open{transform:rotate(180deg)}

.item-body{padding:10px 12px 12px;border-top:1px solid #555}
.status-row{display:flex;gap:5px;margin-bottom:10px}
.s-btn{flex:1;height:34px;border-radius:6px;border:1px solid #555;background:#2a2a2b;color:#9ea0a3;font-size:11px;font-weight:700;cursor:pointer;transition:all .12s;font-family:inherit;text-transform:uppercase;letter-spacing:.04em}
.s-btn:active{transform:scale(.95)}
.s-btn.good.active{background:#1a3d28;color:#4caf78;border-color:#4caf78}
.s-btn.fair.active{background:#3d3200;color:#fddd00;border-color:#fddd00}
.s-btn.damaged.active{background:#3d1010;color:#e05555;border-color:#e05555}
.s-btn.unusable.active{background:#2a0000;color:#ff6666;border-color:#8b0000}

.note-input{width:100%;padding:8px 10px;font-size:13px;border-radius:6px;border:1px solid #555;background:#2a2a2b;color:#e8e6e0;font-family:inherit;resize:vertical;min-height:50px;outline:none;margin-top:4px}
.note-input:focus{border-color:#fddd00}
.note-input::placeholder{color:#666}
.note-label{font-size:9px;font-weight:700;color:#9ea0a3;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;display:block}

/* ── Forklift sections ── */
.section-block{background:#3f3f40;border:1px solid #555;border-radius:10px;margin-bottom:8px;overflow:hidden}
.section-hdr{display:flex;align-items:center;gap:8px;padding:11px 12px;cursor:pointer;background:#353536;user-select:none}
.section-hdr-title{flex:1;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:#e8e6e0;text-transform:uppercase;letter-spacing:.06em}
.section-badge{font-size:10px;padding:2px 8px;border-radius:4px;background:#2a2a2b;border:1px solid #555;color:#9ea0a3;font-weight:700}
.section-badge.has-issues{background:#3d1010;color:#e05555;border-color:#8b0000}
.section-chevron{font-size:14px;color:#666;transition:transform .2s}
.section-chevron.open{transform:rotate(180deg)}
.section-items{padding:6px 8px 8px}

.fork-item{display:flex;align-items:center;gap:8px;padding:9px 4px;border-bottom:1px solid #4a4a4b}
.fork-item:last-child{border-bottom:none}
.fork-num{font-size:10px;color:#666;width:20px;flex-shrink:0;text-align:right}
.fork-name{flex:1;font-size:13px;color:#e8e6e0;font-weight:500}
.fork-check{width:26px;height:26px;border-radius:5px;border:2px solid #555;background:#2a2a2b;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:all .12s;color:transparent}
.fork-check.checked{background:#1a3d28;border-color:#4caf78;color:#4caf78}
.fork-check.issue{background:#3d1010;border-color:#e05555;color:#e05555}
.fork-remark-input{flex:1;height:28px;border-radius:5px;border:1px solid #555;background:#2a2a2b;color:#e8e6e0;padding:0 8px;font-size:12px;font-family:inherit;outline:none}
.fork-remark-input:focus{border-color:#fddd00}
.fork-remark-input::placeholder{color:#555}
.fork-action{display:flex;gap:4px;flex-shrink:0}
.fork-btn{width:30px;height:26px;border-radius:5px;border:1px solid #555;background:transparent;cursor:pointer;font-size:12px;color:#9ea0a3;transition:all .1s}
.fork-btn.ok.active{background:#1a3d28;color:#4caf78;border-color:#4caf78}
.fork-btn.nok.active{background:#3d1010;color:#e05555;border-color:#8b0000}

/* ── Hour meter (forklift) ── */
.hour-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:12px}

/* ── Action buttons ── */
.btn{height:40px;padding:0 14px;border-radius:8px;border:1px solid #555;background:#3f3f40;color:#e8e6e0;font-size:12px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;white-space:nowrap;transition:all .12s;font-family:inherit;text-transform:uppercase;letter-spacing:.04em}
.btn:hover{background:#4a4a4b}
.btn:active{transform:scale(.98)}
.btn.primary{background:#fddd00;color:#3f3f40;border-color:#fddd00}
.btn.primary:hover{background:#e8c800}
.btn.danger-soft{color:#e05555;border-color:#8b0000}
.btn.danger-soft:hover{background:#3d1010}
.btn.report{background:#c0392b;color:#fff;border-color:#c0392b}
.btn.report:hover{background:#a93226}
.action-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;padding-top:14px;border-top:1px solid #555}

/* ── Report modal ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:500;align-items:center;justify-content:center;padding:16px}
.modal-bg.open{display:flex}
.modal{background:#3f3f40;border:1px solid #555;border-top:3px solid #fddd00;border-radius:14px;padding:20px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:#fddd00;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.modal-sub{font-size:12px;color:#9ea0a3;margin-bottom:16px}
.modal-field{margin-bottom:12px}
.modal-field label{display:block;font-size:10px;font-weight:700;color:#9ea0a3;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.modal-field input,.modal-field textarea,.modal-field select{width:100%;border-radius:7px;border:1px solid #555;background:#2a2a2b;color:#e8e6e0;padding:9px 12px;font-size:13px;font-family:inherit;outline:none}
.modal-field input:focus,.modal-field textarea:focus{border-color:#fddd00}
.modal-field textarea{resize:vertical;min-height:80px}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.btn.primary.modal-send{background:#fddd00;color:#3f3f40;border-color:#fddd00}
.btn.primary.modal-send:hover{background:#e8c800}
.modal-issue-list{background:#2a2a2b;border-radius:8px;padding:10px 12px;margin-bottom:10px;max-height:140px;overflow-y:auto}
.modal-issue-item{font-size:12px;color:#e8e6e0;padding:3px 0;border-bottom:1px solid #4a4a4b;display:flex;align-items:flex-start;gap:6px}
.modal-issue-item:last-child{border-bottom:none}
.issue-dot{width:6px;height:6px;border-radius:50%;background:#e05555;flex-shrink:0;margin-top:5px}
.modal-no-issues{font-size:12px;color:#4caf78;padding:4px 0}

/* ── Bottom sign section ── */
.sign-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.sign-field label{display:block;font-size:9px;font-weight:700;color:#9ea0a3;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.sign-field input{width:100%;height:36px;border-radius:6px;border:1px solid #555;background:#2a2a2b;color:#e8e6e0;padding:0 10px;font-size:13px;font-family:inherit;outline:none}
.sign-field input:focus{border-color:#fddd00}

/* ── Toast ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:#3f3f40;border:1px solid #555;border-radius:8px;padding:10px 18px;font-size:13px;color:#e8e6e0;z-index:600;transition:transform .3s;white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{border-color:#4caf78;color:#4caf78}
.toast.error{border-color:#e05555;color:#e05555}


.section-label{font-size:9px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;margin-top:14px;padding-top:12px;border-top:1px solid #555}

/* ── No items state ── */
.empty{text-align:center;padding:32px 16px;color:#666}
.empty-icon{font-size:40px;margin-bottom:10px}

@media print{
  .tab-nav,.action-row,.modal-bg{display:none!important}
  body{background:#fff;color:#000}
  .app{max-width:100%}
}
</style>
</head>

  </nav>
</div>

<!-- App body -->
<div class="app-body" id="app-body"></div>

</div>

<!-- Report Modal -->
<div class="modal-bg" id="report-modal">
  <div class="modal">
    <div class="modal-title" id="report-modal-title">⚠️ Report Issue</div>
    <div class="modal-sub" id="report-sub">Send a fault report to the warehouse manager</div>

    <div id="report-issues-section">
      <div style="font-size:10px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Issues detected on this inspection:</div>
      <div class="modal-issue-list" id="report-issues-list"></div>
    </div>

    <div class="modal-field">
      <label>Send To (Email)</label>
      <input type="email" id="report-email" placeholder="manager@company.com" value="warehouse@rhinoenergy.co.za">
    </div>
    <div class="modal-field">
      <label>Your Name</label>
      <input type="text" id="report-sender" placeholder="Your name">
    </div>
    <div class="modal-field">
      <label>Additional Notes</label>
      <textarea id="report-notes" placeholder="Any extra details, urgency, actions needed..."></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn" style="flex:1" onclick="closeReportModal()">Cancel</button>
      <button class="btn report" id="report-send-btn" style="flex:2" onclick="sendReport()">📧 Send Report</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────

const TRAILER_ITEMS = [
  'Body','Tyres','Hand brake','Spare Wheel',
  'Brake light Left','Brake light Right',
  'Indicator light Left','Indicator light Right',
  'Side Pins','Side Braces',
  'License disc','License plate',
  'Emergency Chain','Hitch','Trailer plug'
];

const BRONKO_ITEMS = [
  'Body','Tyres','Hand brake','Spare Wheel',
  'Brake light Left','Brake light Right',
  'Indicator light Left','Indicator light Right',
  'Load planks',
  'License disc','License plate',
  'Emergency Chain','Hitch','Trailer plug'
];

const FORKLIFT_PRESTART = [
  'No obstructions under truck','Condition of attachment',
  'Load back rest','Carriage','Mast','Lifting chains',
  'Hydraulic lift cylinder and hydraulic tilt cylinder',
  'Overhead guard','Tyre condition and pressure (if applicable)',
  'Wheel nuts and rims','Operators compartment clean',
  'Hydraulic oil level','Fan belt tension','Water pump',
  'Counterweight','Radiator cap','Radiator water level',
  'Fuel cap','Battery electrolyte level','Battery terminals',
  'Air filter','Engine oil level','Brake fluid level',
  'All pipes and hoses','Transmission oil','Capacity plate',
  'Any oil or water leaks','General condition',
  'Gas cylinder secure (if applicable)','Gas leaks (if applicable)'
];

const FORKLIFT_OPERATIONAL = [
  'Test for free-play on the steering',
  'Test pressure on brake pedals',
  'Start the machine',
  'Warm up for at least three minutes',
  'Test all lights and indicators',
  'Test the hooter',
  'Check all gauges',
  'Test the lifting cylinders',
  'Test the tilt cylinder',
  'Test any other controls (if applicable)',
  'Test the park brake',
  'Test the foot brake',
  'Test the steering'
];

const STATUS_OPTIONS = ['good','fair','damaged','unusable'];

// ─── STATE ───────────────────────────────────────────────────────────────────

let currentTab = 'diamond';

function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

const defaultTrailerState = (items) => ({
  date: todayISO(), team: '', inspectedWith: '',
  inspectedByName: '', inspectedWithName: '',
  items: items.map(n => ({name:n, status:'', note:'', open:false}))
});

const defaultForkliftState = () => ({
  date: todayISO(), coNo:'', machine:'', motive:'',
  capacity:'', hourStart:'', hourFinish:'',
  operatorName:'', supervisorName:'',
  prestart: FORKLIFT_PRESTART.map(n=>({name:n, checked:false, remark:''})),
  operational: FORKLIFT_OPERATIONAL.map(n=>({name:n, checked:false, remark:''}))
});

let state = {
  diamond: defaultTrailerState(TRAILER_ITEMS),
  scorpion: defaultTrailerState(TRAILER_ITEMS),
  bronko: defaultTrailerState(BRONKO_ITEMS),
  forklift: defaultForkliftState()
};

function loadState() {
  try {
    const saved = localStorage.getItem('fleet_inspection_v1');
    if (saved) {
      state = JSON.parse(saved);
      // If saved date is from a previous day, update all dates to today
      const today = todayISO();
      ['diamond','scorpion','bronko'].forEach(t => {
        if (!state[t].date || state[t].date !== today) state[t].date = today;
      });
      if (!state.forklift.date || state.forklift.date !== today) state.forklift.date = today;
    }
  } catch(e){}
}

function saveState() {
  try { localStorage.setItem('fleet_inspection_v1', JSON.stringify(state)); } catch(e){}
}

// ─── RENDER ──────────────────────────────────────────────────────────────────

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  render();
}

function render() {
  const body = document.getElementById('app-body');
  if (currentTab === 'forklift') body.innerHTML = renderForklift();
  else body.innerHTML = renderTrailer(currentTab);
}

function trailerLabel(t) {
  return t === 'diamond' ? 'Diamond Trailer' : t === 'scorpion' ? 'Scorpion Trailer' : 'Bronko Trailer';
}

function renderTrailer(trailer) {
  const s = state[trailer];
  const stats = {good:0, fair:0, damaged:0, unusable:0, total:s.items.length};
  s.items.forEach(it => { if(it.status) stats[it.status]++; });
  const issues = s.items.filter(it => it.status === 'damaged' || it.status === 'unusable');

  return `
  <div class="meta-card">
    <div class="meta-title">${trailerLabel(trailer)} — Inspection Details</div>
    <div class="meta-grid three">
      <div class="meta-field"><label>Date</label><input type="date" value="${s.date}" onchange="updateMeta('${trailer}','date',this.value)"></div>
      <div class="meta-field"><label>Team #</label><input type="text" placeholder="e.g. 3" value="${s.team}" onchange="updateMeta('${trailer}','team',this.value)"></div>
      <div class="meta-field"><label>Inspected With</label><input type="text" placeholder="Name" value="${s.inspectedWith}" onchange="updateMeta('${trailer}','inspectedWith',this.value)"></div>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-label">Good</div><div class="stat-val good">${stats.good}</div></div>
    <div class="stat"><div class="stat-label">Fair</div><div class="stat-val fair">${stats.fair}</div></div>
    <div class="stat"><div class="stat-label">Issues</div><div class="stat-val dmg">${stats.damaged + stats.unusable}</div></div>
    <div class="stat"><div class="stat-label">Total</div><div class="stat-val tot">${stats.total}</div></div>
  </div>

  ${s.items.map((it, idx) => `
  <div class="insp-item" id="item-${trailer}-${idx}">
    <div class="item-hdr" onclick="toggleItem('${trailer}',${idx})">
      <div class="item-num">${String(idx+1).padStart(2,'0')}</div>
      <div class="item-name">${it.name}</div>
      ${it.status ? `<div class="item-status-dot ${it.status}"></div>` : `<div class="item-status-dot"></div>`}
      <div class="item-chevron ${it.open ? 'open' : ''}">▼</div>
    </div>
    ${it.open ? `
    <div class="item-body">
      <div class="status-row">
        ${STATUS_OPTIONS.map(st => `<button class="s-btn ${st} ${it.status===st?'active':''}" onclick="setStatus('${trailer}',${idx},'${st}')">${st}</button>`).join('')}
      </div>
      <span class="note-label">Notes</span>
      <textarea class="note-input" placeholder="Add a note..." onchange="setNote('${trailer}',${idx},this.value)">${it.note}</textarea>
    </div>` : ''}
  </div>`).join('')}

  <div class="meta-card" style="margin-top:14px">
    <div class="meta-title">Signatures</div>
    <div class="sign-row">
      <div class="sign-field"><label>Inspected By — Name</label><input type="text" placeholder="Name" value="${s.inspectedByName}" onchange="updateMeta('${trailer}','inspectedByName',this.value)"></div>
      <div class="sign-field"><label>Inspected With — Name</label><input type="text" placeholder="Name" value="${s.inspectedWithName}" onchange="updateMeta('${trailer}','inspectedWithName',this.value)"></div>
    </div>
  </div>

  <div class="action-row">
    <button class="btn primary" style="flex:1" onclick="openReportModal('${trailer}','complete')">📤 Send to Manager</button>
    <button class="btn report" onclick="openReportModal('${trailer}','issue')">⚠️ Report Issue</button>
  </div>
  <div class="action-row" style="padding-top:6px;border-top:none;margin-top:-6px">
    <button class="btn" onclick="exportTrailerReport('${trailer}')">📄 Export HTML</button>
    <button class="btn danger-soft" onclick="resetTrailer('${trailer}')">↺ Reset</button>
  </div>`;
}

function renderForklift() {
  const s = state.forklift;
  const psChecked = s.prestart.filter(i=>i.checked).length;
  const opChecked = s.operational.filter(i=>i.checked).length;
  const total = s.prestart.length + s.operational.length;
  const checked = psChecked + opChecked;

  return `
  <div class="meta-card">
    <div class="meta-title">Forklift Pre-Start Inspection</div>
    <div class="meta-grid">
      <div class="meta-field"><label>Date</label><input type="date" value="${s.date}" onchange="updateFork('date',this.value)"></div>
      <div class="meta-field"><label>Co. No.</label><input type="text" placeholder="Company No." value="${s.coNo}" onchange="updateFork('coNo',this.value)"></div>
      <div class="meta-field"><label>Machine Make</label><input type="text" placeholder="Make/Model" value="${s.machine}" onchange="updateFork('machine',this.value)"></div>
      <div class="meta-field"><label>Motive Power</label><input type="text" placeholder="Diesel/LPG/Electric" value="${s.motive}" onchange="updateFork('motive',this.value)"></div>
      <div class="meta-field"><label>Capacity</label><input type="text" placeholder="e.g. 2500 kg" value="${s.capacity}" onchange="updateFork('capacity',this.value)"></div>
    </div>
    <div class="section-label" style="margin-top:8px;padding-top:8px">Hour Meter</div>
    <div class="hour-row">
      <div class="meta-field"><label>Hour Start</label><input type="text" placeholder="e.g. 1245" value="${s.hourStart}" onchange="updateFork('hourStart',this.value)"></div>
      <div class="meta-field"><label>Hour Finish</label><input type="text" placeholder="e.g. 1290" value="${s.hourFinish}" onchange="updateFork('hourFinish',this.value)"></div>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-label">Checked</div><div class="stat-val good">${checked}</div></div>
    <div class="stat"><div class="stat-label">Remaining</div><div class="stat-val fair">${total - checked}</div></div>
    <div class="stat"><div class="stat-label">Pre-Start</div><div class="stat-val tot">${psChecked}/${s.prestart.length}</div></div>
    <div class="stat"><div class="stat-label">Operational</div><div class="stat-val tot">${opChecked}/${s.operational.length}</div></div>
  </div>

  <div class="section-block">
    <div class="section-hdr" onclick="toggleSection('fork-prestart')">
      <div class="section-hdr-title">Pre-Start Checks</div>
      <div class="section-badge ${s.prestart.filter(i=>i.checked).length < s.prestart.length ? '' : ''}">${psChecked}/${s.prestart.length}</div>
      <div class="section-chevron open" id="chev-fork-prestart">▼</div>
    </div>
    <div class="section-items" id="sect-fork-prestart">
      ${s.prestart.map((it,idx) => `
      <div class="fork-item">
        <div class="fork-num">${idx+1}</div>
        <div class="fork-name">${it.name}</div>
        <div class="fork-check ${it.checked?'checked':''}" onclick="toggleForkCheck('prestart',${idx})">${it.checked?'✓':''}</div>
        <input class="fork-remark-input" placeholder="Remark..." value="${it.remark}" onchange="setForkRemark('prestart',${idx},this.value)" style="max-width:120px">
      </div>`).join('')}
    </div>
  </div>

  <div class="section-block">
    <div class="section-hdr" onclick="toggleSection('fork-operational')">
      <div class="section-hdr-title">Operational Checks</div>
      <div class="section-badge">${opChecked}/${s.operational.length}</div>
      <div class="section-chevron open" id="chev-fork-operational">▼</div>
    </div>
    <div class="section-items" id="sect-fork-operational">
      ${s.operational.map((it,idx) => `
      <div class="fork-item">
        <div class="fork-num">${idx+1}</div>
        <div class="fork-name">${it.name}</div>
        <div class="fork-check ${it.checked?'checked':''}" onclick="toggleForkCheck('operational',${idx})">${it.checked?'✓':''}</div>
        <input class="fork-remark-input" placeholder="Remark..." value="${it.remark}" onchange="setForkRemark('operational',${idx},this.value)" style="max-width:120px">
      </div>`).join('')}
    </div>
  </div>

  <div class="meta-card" style="margin-top:4px">
    <div class="meta-title">Signatures</div>
    <div class="sign-row">
      <div class="sign-field"><label>Operator Name</label><input type="text" placeholder="Name" value="${s.operatorName}" onchange="updateFork('operatorName',this.value)"></div>
      <div class="sign-field"><label>Supervisor Name</label><input type="text" placeholder="Name" value="${s.supervisorName}" onchange="updateFork('supervisorName',this.value)"></div>
    </div>
  </div>

  <div class="action-row">
    <button class="btn primary" style="flex:1" onclick="openReportModal('forklift','complete')">📤 Send to Manager</button>
    <button class="btn report" onclick="openReportModal('forklift','issue')">⚠️ Report Issue</button>
  </div>
  <div class="action-row" style="padding-top:6px;border-top:none;margin-top:-6px">
    <button class="btn" onclick="exportForkliftReport()">📄 Export HTML</button>
    <button class="btn danger-soft" onclick="resetForklift()">↺ Reset</button>
  </div>`;
}

// ─── STATE UPDATES ────────────────────────────────────────────────────────────

function updateMeta(trailer, key, val) {
  state[trailer][key] = val;
  saveState();
}

function updateFork(key, val) {
  state.forklift[key] = val;
  saveState();
}

function toggleItem(trailer, idx) {
  state[trailer].items[idx].open = !state[trailer].items[idx].open;
  render();
}

function setStatus(trailer, idx, status) {
  state[trailer].items[idx].status = status;
  saveState(); render();
}

function setNote(trailer, idx, note) {
  state[trailer].items[idx].note = note;
  saveState();
}

// ─── PHOTO CAPTURE ────────────────────────────────────────────────────────────

function toggleForkCheck(section, idx) {
  state.forklift[section][idx].checked = !state.forklift[section][idx].checked;
  saveState(); render();
}

function setForkRemark(section, idx, remark) {
  state.forklift[section][idx].remark = remark;
  saveState();
}

function toggleSection(id) {
  const sect = document.getElementById('sect-'+id);
  const chev = document.getElementById('chev-'+id);
  if (!sect) return;
  const isOpen = sect.style.display !== 'none';
  sect.style.display = isOpen ? 'none' : '';
  if (chev) chev.classList.toggle('open', !isOpen);
}

function resetTrailer(trailer) {
  if (!confirm(`Reset all ${trailerLabel(trailer)} data?`)) return;
  const items = trailer === 'bronko' ? BRONKO_ITEMS : TRAILER_ITEMS;
  state[trailer] = defaultTrailerState(items);
  saveState(); render();
}

function resetForklift() {
  if (!confirm('Reset all forklift data?')) return;
  state.forklift = defaultForkliftState();
  saveState(); render();
}

// ─── REPORT MODAL ─────────────────────────────────────────────────────────────

const MANAGER_EMAIL = 'warehouse@rhinoenergy.co.za';
let reportTarget = '';
let reportMode = 'issue'; // 'issue' or 'complete'

function openReportModal(target, mode='issue') {
  reportTarget = target;
  reportMode = mode;
  const modal = document.getElementById('report-modal');
  const list = document.getElementById('report-issues-list');
  const sub = document.getElementById('report-sub');
  const title = document.getElementById('report-modal-title');
  const sendBtn = document.getElementById('report-send-btn');
  const issuesSection = document.getElementById('report-issues-section');

  // Pre-fill email
  document.getElementById('report-email').value = MANAGER_EMAIL;

  // Pre-fill sender name if available
  if (target !== 'forklift' && state[target].inspectedByName)
    document.getElementById('report-sender').value = state[target].inspectedByName;
  else if (target === 'forklift' && state.forklift.operatorName)
    document.getElementById('report-sender').value = state.forklift.operatorName;

  document.getElementById('report-notes').value = '';

  const label = target === 'forklift' ? 'Forklift' : trailerLabel(target);

  if (mode === 'complete') {
    title.textContent = '📋 Send Completed Inspection';
    sub.textContent = `Send full inspection summary to warehouse manager`;
    sendBtn.textContent = '📧 Send to Manager';
    sendBtn.className = 'btn primary';
    sendBtn.style.flex = '2';
    issuesSection.style.display = 'none';
  } else {
    title.textContent = '⚠️ Report Issue';
    sub.textContent = `Send a fault report for ${label}`;
    sendBtn.textContent = '📧 Send Report';
    sendBtn.className = 'btn report';
    sendBtn.style.flex = '2';
    issuesSection.style.display = '';

    let issues = [];
    if (target === 'forklift') {
      const unchecked = [
        ...state.forklift.prestart.filter(i=>!i.checked).map(i=>i.name),
        ...state.forklift.operational.filter(i=>!i.checked).map(i=>i.name)
      ];
      const remarks = [
        ...state.forklift.prestart.filter(i=>i.remark).map(i=>`${i.name}: ${i.remark}`),
        ...state.forklift.operational.filter(i=>i.remark).map(i=>`${i.name}: ${i.remark}`)
      ];
      issues = [...unchecked.slice(0,10), ...remarks];
    } else {
      issues = state[target].items
        .filter(it => it.status === 'damaged' || it.status === 'unusable')
        .map(it => `${it.name} — ${it.status.toUpperCase()}${it.note ? ': '+it.note : ''}`);
    }

    list.innerHTML = issues.length === 0
      ? '<div class="modal-no-issues">✅ No issues / damaged items recorded on this inspection.</div>'
      : issues.map(i => `<div class="modal-issue-item"><div class="issue-dot"></div>${i}</div>`).join('');
  }

  modal.classList.add('open');
}

function closeReportModal() {
  document.getElementById('report-modal').classList.remove('open');
}

function sendReport() {
  const email = document.getElementById('report-email').value.trim();
  const sender = document.getElementById('report-sender').value.trim();
  const notes = document.getElementById('report-notes').value.trim();

  if (!email) { showToast('Please enter the manager email address', 'error'); return; }

  let subject, body;
  const date = todayISO(); // use YYYY-MM-DD to avoid slash encoding issues

  if (reportTarget === 'forklift') {
    const s = state.forklift;
    const uncheckedPS = s.prestart.filter(i=>!i.checked).map(i=>i.name);
    const uncheckedOP = s.operational.filter(i=>!i.checked).map(i=>i.name);
    const remarks = [
      ...s.prestart.filter(i=>i.remark).map(i=>`  • ${i.name}: ${i.remark}`),
      ...s.operational.filter(i=>i.remark).map(i=>`  • ${i.name}: ${i.remark}`)
    ];
    const psChecked = s.prestart.filter(i=>i.checked).length;
    const opChecked = s.operational.filter(i=>i.checked).length;

    if (reportMode === 'complete') {
      subject = `[FORKLIFT] Completed Inspection — ${s.date || date}`;
      body = `FORKLIFT PRE-START INSPECTION — COMPLETED\n`
        + `${'='.repeat(50)}\n`
        + `Date: ${s.date || date}\n`
        + `Machine: ${s.machine || 'N/A'}  |  Co. No: ${s.coNo || 'N/A'}\n`
        + `Motive Power: ${s.motive || 'N/A'}  |  Capacity: ${s.capacity || 'N/A'}\n`
        + `Hour Meter — Start: ${s.hourStart || 'N/A'}  |  Finish: ${s.hourFinish || 'N/A'}\n`
        + `Operator: ${s.operatorName || 'N/A'}  |  Supervisor: ${s.supervisorName || 'N/A'}\n`
        + `Submitted by: ${sender || 'Unknown'}\n\n`
        + `SUMMARY\n${'─'.repeat(30)}\n`
        + `Pre-Start Checks: ${psChecked}/${s.prestart.length} completed\n`
        + `Operational Checks: ${opChecked}/${s.operational.length} completed\n\n`;

      if (uncheckedPS.length > 0 || uncheckedOP.length > 0) {
        body += `⚠️  INCOMPLETE CHECKS:\n`;
        uncheckedPS.forEach(i => body += `  • [PRE-START] ${i}\n`);
        uncheckedOP.forEach(i => body += `  • [OPERATIONAL] ${i}\n`);
        body += '\n';
      } else {
        body += `✅  All checks completed.\n\n`;
      }

      if (remarks.length > 0) { body += `REMARKS:\n` + remarks.join('\n') + '\n\n'; }
      if (notes) body += `ADDITIONAL NOTES:\n${notes}\n\n`;

      body += `PRE-START CHECKLIST:\n${'─'.repeat(30)}\n`;
      s.prestart.forEach((it,i) => { body += `  ${i+1}. [${it.checked?'✓':' '}] ${it.name}${it.remark?' — '+it.remark:''}\n`; });
      body += `\nOPERATIONAL CHECKLIST:\n${'─'.repeat(30)}\n`;
      s.operational.forEach((it,i) => { body += `  ${i+1}. [${it.checked?'✓':' '}] ${it.name}${it.remark?' — '+it.remark:''}\n`; });

    } else {
      subject = `[FORKLIFT INSPECTION] Issue Report — ${date}`;
      body = `FORKLIFT PRE-START INSPECTION — ISSUE REPORT\n`
        + `Date: ${s.date || date}\n`
        + `Machine: ${s.machine || 'N/A'}  |  Co. No: ${s.coNo || 'N/A'}\n`
        + `Hour Meter Start: ${s.hourStart || 'N/A'}  |  Finish: ${s.hourFinish || 'N/A'}\n`
        + `Reported by: ${sender || 'Unknown'}\n\n`;
      if (uncheckedPS.length > 0) body += `PRE-START CHECKS NOT COMPLETED (${uncheckedPS.length}):\n` + uncheckedPS.map(i=>`  • ${i}`).join('\n') + '\n\n';
      if (uncheckedOP.length > 0) body += `OPERATIONAL CHECKS NOT COMPLETED (${uncheckedOP.length}):\n` + uncheckedOP.map(i=>`  • ${i}`).join('\n') + '\n\n';
      if (remarks.length > 0) body += `REMARKS / FAULTS NOTED:\n` + remarks.join('\n') + '\n\n';
      if (notes) body += `ADDITIONAL NOTES:\n${notes}\n\n`;
    }

  } else {
    const s = state[reportTarget];
    const label = trailerLabel(reportTarget);
    const issues = s.items.filter(it => it.status === 'damaged' || it.status === 'unusable');
    const fairItems = s.items.filter(it => it.status === 'fair');
    const goodItems = s.items.filter(it => it.status === 'good');

    if (reportMode === 'complete') {
      subject = `[${label.toUpperCase()}] Completed Inspection — ${s.date || date}`;
      body = `${label.toUpperCase()} — COMPLETED INSPECTION\n`
        + `${'='.repeat(50)}\n`
        + `Date: ${s.date || date}  |  Team: ${s.team || 'N/A'}  |  Inspected With: ${s.inspectedWith || 'N/A'}\n`
        + `Inspected By: ${s.inspectedByName || 'N/A'}  |  Witness: ${s.inspectedWithName || 'N/A'}\n`
        + `Submitted by: ${sender || 'Unknown'}\n\n`
        + `SUMMARY\n${'─'.repeat(30)}\n`
        + `Good: ${goodItems.length}  |  Fair: ${fairItems.length}  |  Damaged/Unusable: ${issues.length}  |  Total: ${s.items.length}\n\n`;

      if (issues.length > 0) {
        body += `⚠️  ITEMS REQUIRING ATTENTION (${issues.length}):\n`;
        issues.forEach(it => { body += `  • ${it.name} — ${it.status.toUpperCase()}${it.note ? '\n    Note: '+it.note : ''}\n`; });
        body += '\n';
      } else {
        body += `✅  No damaged or unusable items.\n\n`;
      }

      if (fairItems.length > 0) {
        body += `ITEMS IN FAIR CONDITION (monitor):\n`;
        fairItems.forEach(it => { body += `  • ${it.name}${it.note ? ': '+it.note : ''}\n`; });
        body += '\n';
      }

      body += `FULL CHECKLIST:\n${'─'.repeat(30)}\n`;
      s.items.forEach((it,i) => {
        const st = it.status ? it.status.toUpperCase() : 'NOT SET';
        body += `  ${i+1}. ${it.name} — ${st}${it.note ? ' ('+it.note+')' : ''}\n`;
      });
      if (notes) body += `\nADDITIONAL NOTES:\n${notes}\n`;

    } else {
      subject = `[${label.toUpperCase()}] Inspection Issue Report — ${date}`;
      body = `${label.toUpperCase()} — INSPECTION ISSUE REPORT\n`
        + `Date: ${s.date || date}  |  Team: ${s.team || 'N/A'}  |  Inspected with: ${s.inspectedWith || 'N/A'}\n`
        + `Reported by: ${sender || s.inspectedByName || 'Unknown'}\n\n`;
      if (issues.length > 0) {
        body += `ITEMS REQUIRING ATTENTION (${issues.length}):\n`;
        issues.forEach(it => { body += `  • ${it.name} — ${it.status.toUpperCase()}${it.note ? '\n    Note: '+it.note : ''}\n`; });
        body += '\n';
      } else {
        body += `No damaged/unusable items recorded on this inspection.\n\n`;
      }
      if (fairItems.length > 0) {
        body += `ITEMS IN FAIR CONDITION (monitor):\n`;
        fairItems.forEach(it => { body += `  • ${it.name}${it.note ? ': '+it.note : ''}\n`; });
        body += '\n';
      }
      if (notes) body += `ADDITIONAL NOTES:\n${notes}\n\n`;
    }
  }

  body += `\n---\nSent via Fleet Inspection App`;

  // ── Send via EmailJS ──
  const sendBtn = document.getElementById('report-send-btn');
  sendBtn.disabled = true;
  sendBtn.textContent = '⏳ Sending...';

  emailjs.send('service_gxm3t7b', 'template_o3n4kxn', {
    subject: subject,
    message: body,
    sender_name: sender || 'Unknown',
    reply_to: email
  })
  .then(() => {
    closeReportModal();
    showToast('✅ Email sent to warehouse manager!', 'success');
  })
  .catch((err) => {
    console.error('EmailJS error:', err);
    showToast('❌ Failed to send — check your connection', 'error');
  })
  .finally(() => {
    sendBtn.disabled = false;
    sendBtn.textContent = reportMode === 'complete' ? '📧 Send to Manager' : '📧 Send Report';
  });
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.classList.remove('show'), 2800);
}

// Close modal on backdrop click
document.getElementById('report-modal').addEventListener('click', function(e) {
  if (e.target === this) closeReportModal();
});

function updateDateHeader() {
  const d = new Date();
  document.getElementById('hdr-date').innerHTML = d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
}
